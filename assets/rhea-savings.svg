<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="12" fill="#0A0F1E"/>
  
  <!-- Labels -->
  <text x="400" y="50" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">ZERO-COST API ECONOMICS</text>
  <text x="400" y="80" fill="#9CA3AF" font-family="Arial" font-size="16" text-anchor="middle">Contrasting metered tokens with Rhea's subscription tunneling</text>

  <!-- Traditional Model -->
  <rect x="100" y="150" width="250" height="200" rx="8" fill="#161B33" stroke="#9CA3AF" stroke-width="1"/>
  <text x="225" y="180" fill="white" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">TRADITIONAL API</text>
  <text x="225" y="205" fill="#FF4B2B" font-family="Arial" font-size="14" text-anchor="middle">METERED TOKEN COST</text>
  
  <text x="225" y="250" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">$0.03 / 1k Tokens</text>
  <text x="225" y="270" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">$0.06 / 1k Tokens</text>
  <text x="225" y="290" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">$0.09 / 1k Tokens</text>
  <text x="225" y="320" fill="#FF4B2B" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">EXPONENTIAL SCALING</text>

  <!-- Rhea Model -->
  <rect x="450" y="150" width="250" height="200" rx="8" fill="#161B33" stroke="#00F2FF" stroke-width="2"/>
  <text x="575" y="180" fill="white" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">RHEA ORCHESTRATOR</text>
  <text x="575" y="205" fill="#4BB543" font-family="Arial" font-size="14" text-anchor="middle">FLAT SUBSCRIPTION</text>
  
  <rect x="500" y="240" width="150" height="40" rx="20" fill="#161B33" stroke="#00F2FF" stroke-width="1"/>
  <text x="575" y="265" fill="#00F2FF" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">ZERO PER-TOKEN</text>
  <text x="575" y="320" fill="#4BB543" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">FLAT MONTHLY COST</text>

  <!-- VS -->
  <circle cx="400" y="250" r="25" fill="#161B33" stroke="#9CA3AF" stroke-width="1"/>
  <text x="400" y="257" fill="white" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">VS</text>
</svg>
