<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="12" fill="#0A0F1E"/>
  
  <!-- Labels -->
  <text x="400" y="50" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">RHEA POD ORCHESTRATION</text>
  <text x="400" y="80" fill="#9CA3AF" font-family="Arial" font-size="16" text-anchor="middle">Socratic Debate loop for high-fidelity reasoning</text>

  <!-- Role Nodes -->
  <!-- Dreamer -->
  <circle cx="400" y="150" r="40" fill="#161B33" stroke="#00F2FF" stroke-width="2"/>
  <text x="400" y="210" fill="white" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">DREAMER</text>
  <text x="400" y="230" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">Expands solution space</text>

  <!-- Doubter -->
  <circle cx="250" y="300" r="40" fill="#161B33" stroke="#FF4B2B" stroke-width="2"/>
  <text x="250" y="360" fill="white" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">DOUBTER</text>
  <text x="250" y="380" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">Contracts and critiques</text>

  <!-- Decider -->
  <circle cx="550" y="300" r="40" fill="#161B33" stroke="#4BB543" stroke-width="2"/>
  <text x="550" y="360" fill="white" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">DECIDER</text>
  <text x="550" y="380" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">Commits to a result</text>

  <!-- Loop Arrows -->
  <path d="M360 160L280 270" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow-grey)"/>
  <text x="300" y="200" fill="#9CA3AF" font-family="Arial" font-size="12" transform="rotate(-55 300 200)">Proposal</text>
  
  <path d="M300 300L500 300" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow-grey)"/>
  <text x="400" y="290" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">Critique</text>

  <path d="M520 270L440 160" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow-grey)"/>
  <text x="500" y="200" fill="#9CA3AF" font-family="Arial" font-size="12" transform="rotate(55 500 200)">Feedback</text>

  <defs>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF" />
    </marker>
  </defs>
</svg>
