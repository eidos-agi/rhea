<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="12" fill="#0A0F1E"/>
  
  <!-- Nodes -->
  <rect x="50" y="150" width="180" height="100" rx="8" fill="#161B33" stroke="#00F2FF" stroke-width="2"/>
  <text x="140" y="195" fill="white" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">RHEA CLIENT</text>
  <text x="140" y="220" fill="#00F2FF" font-family="Arial" font-size="12" text-anchor="middle">VPS / Laptop / Agent</text>

  <rect x="570" y="100" width="180" height="200" rx="8" fill="#161B33" stroke="#00F2FF" stroke-width="2"/>
  <text x="660" y="140" fill="white" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">RHEA SERVER</text>
  <text x="660" y="165" fill="#00F2FF" font-family="Arial" font-size="12" text-anchor="middle">Mac / Cloud VM</text>
  
  <!-- Subscriptions inside Server -->
  <rect x="590" y="185" width="140" height="30" rx="4" fill="#0A0F1E" stroke="#4B5563"/>
  <text x="660" y="205" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">Claude Pro CLI</text>
  <rect x="590" y="225" width="140" height="30" rx="4" fill="#0A0F1E" stroke="#4B5563"/>
  <text x="660" y="245" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">Gemini Advanced CLI</text>
  <rect x="590" y="265" width="140" height="30" rx="4" fill="#0A0F1E" stroke="#4B5563"/>
  <text x="660" y="285" fill="#9CA3AF" font-family="Arial" font-size="12" text-anchor="middle">Codex / OpenRouter</text>

  <!-- Tunnel -->
  <path d="M230 200C300 200 500 200 570 200" stroke="#00F2FF" stroke-width="4" stroke-dasharray="8 8" filter="url(#glow)"/>
  <rect x="300" y="180" width="200" height="40" rx="20" fill="#161B33" stroke="#00F2FF" stroke-width="1"/>
  <text x="400" y="205" fill="#00F2FF" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">TAILSCALE SSH TUNNEL</text>
  
  <!-- Labels -->
  <text x="400" y="50" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">SECURE COMPUTE TUNNELING</text>
  <text x="400" y="80" fill="#9CA3AF" font-family="Arial" font-size="16" text-anchor="middle">Bridging local subscriptions to remote environments</text>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
</svg>
