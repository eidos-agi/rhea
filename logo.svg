<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#0A0A0F"/>
  
  <!-- Subtle Glow Gradient -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00F2FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00F2FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FF"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <filter id="neonBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Rhea Bird Silhouette (Abstract/Geometric) -->
  <!-- Body and Neck -->
  <path d="M160 400 C 160 320, 200 280, 280 260 L 300 180 C 300 140, 270 120, 240 120 C 220 120, 210 130, 210 150" stroke="url(#neonGradient)" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#neonBlur)"/>
  
  <!-- Beak -->
  <path d="M210 150 L 190 155" stroke="#00F2FF" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Intelligence Mesh / Circuitry -->
  <g stroke="#00F2FF" stroke-width="2" opacity="0.7">
    <!-- Body nodes and connections -->
    <circle cx="180" cy="380" r="4" fill="#00F2FF"/>
    <circle cx="230" cy="320" r="4" fill="#00F2FF"/>
    <circle cx="290" cy="250" r="4" fill="#00F2FF"/>
    <circle cx="280" cy="110" r="4" fill="#00F2FF"/>
    
    <line x1="180" y1="380" x2="230" y2="320" stroke-dasharray="4 4"/>
    <line x1="230" y1="320" x2="290" y2="250" stroke-dasharray="2 2"/>
    <line x1="290" y1="250" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="280" y2="110" stroke-dasharray="8 4"/>
  </g>

  <!-- Orchestration Routing Lines -->
  <g opacity="0.3">
    <path d="M80 420 L 140 380 L 180 380" stroke="#00F2FF" stroke-width="1.5"/>
    <circle cx="80" cy="420" r="3" fill="#00F2FF"/>
    
    <path d="M432 92 L 360 140 L 300 180" stroke="#00F2FF" stroke-width="1.5"/>
    <circle cx="432" cy="92" r="3" fill="#00F2FF"/>
    
    <path d="M420 420 L 360 360 L 290 250" stroke="#00F2FF" stroke-width="1.5"/>
    <circle cx="420" cy="420" r="3" fill="#00F2FF"/>
  </g>

  <!-- Central "Decision" Node (Glow) -->
  <circle cx="256" cy="256" r="16" fill="#00F2FF" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="256" cy="256" r="6" fill="#00F2FF" filter="url(#neonBlur)"/>

</svg>
